# Locust Configuration for Digital Chama Load Testing
# Run with: locust -f tests/load_tests.py --config=locust.conf

locustfile = "tests/load_tests.py"
headless = false
users = 100
spawn-rate = 10
run-time = 5m
host = "https://your-domain.com"  # Change this to your production domain

# Web UI settings
web-host = "0.0.0.0"
web-port = 8089

# CSV output
csv = "reports/load_test_results"

# Logging
loglevel = "INFO"
logfile = "logs/locust.log"

# Stop timeout
stop-timeout = 30