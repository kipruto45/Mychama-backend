[tool.black]
line-length = 88
target-version = ["py312"]
exclude = "(venv|\\.venv|migrations)"

[tool.isort]
profile = "black"
line_length = 88
skip = ["venv", ".venv", "migrations"]
known_first_party = ["config", "api", "core", "apps"]

[tool.ruff]
line-length = 88
target-version = "py312"
exclude = ["venv", ".venv", "migrations"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "DJ"]
ignore = ["E501", "B007", "B904", "DJ001", "E402", "E741", "F401", "F841", "UP038"]

[tool.ruff.lint.per-file-ignores]
"config/settings/*.py" = ["F403", "F405"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.test"
python_files = ["tests.py", "test_*.py", "*_tests.py"]
testpaths = ["apps"]
cache_dir = "/tmp/pytest_cache"
addopts = "-q --ignore=tests/load_tests.py"
