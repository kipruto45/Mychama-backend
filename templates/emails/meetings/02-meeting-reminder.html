<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Tomorrow - {{meeting_title}}</title>
</head>
<body style="margin: 0; padding: 0; background-color: #F3F4F6; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <div style="display: none; font-size: 0; color: transparent; mso-hide: all;">Reminder: {{meeting_title}} is tomorrow</div>
  
  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #F3F4F6;">
    <tr>
      <td align="center" style="padding: 40px 20px;">
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="max-width: 600px; background-color: #FFFFFF; border-radius: 16px; overflow: hidden;">
          <!-- Header -->
          <tr>
            <td style="padding: 32px 32px 24px; text-align: center; border-bottom: 1px solid #E5E7EB;">
              &nbsp;
            </td>
          </tr>
          
          <!-- Content -->
          <tr>
            <td style="padding: 40px 32px;">
              <div style="text-align: center; margin-bottom: 24px;">
                <span style="display: inline-flex; align-items: center; justify-content: center; width: 64px; height: 64px; background: #FEF3C7; border-radius: 16px; font-size: 32px;">⏰</span>
              </div>
              
              <h1 style="margin: 0 0 8px; font-size: 24px; font-weight: 700; color: #0A0A0A; line-height: 1.3; text-align: center;">Meeting Tomorrow</h1>
              <p style="margin: 0 0 24px; font-size: 16px; color: #6B7280; text-align: center;">{{chama_name}}</p>
              
              <!-- Meeting Details -->
              <div style="background: #F9FAFB; border-radius: 12px; padding: 24px; margin: 24px 0;">
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                  <tr>
                    <td style="padding: 12px 0; border-bottom: 1px solid #E5E7EB;">
                      <span style="font-size: 14px; color: #6B7280;">Meeting</span>
                      <div style="font-size: 16px; font-weight: 600; color: #111827;">{{meeting_title}}</div>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding: 12px 0; border-bottom: 1px solid #E5E7EB;">
                      <span style="font-size: 14px; color: #6B7280;">Date</span>
                      <div style="font-size: 16px; font-weight: 600; color: #111827;">{{meeting_date}}</div>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding: 12px 0; border-bottom: 1px solid #E5E7EB;">
                      <span style="font-size: 14px; color: #6B7280;">Time</span>
                      <div style="font-size: 16px; font-weight: 600; color: #111827;">{{meeting_time}}</div>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding: 12px 0;">
                      <span style="font-size: 14px; color: #6B7280;">Venue</span>
                      <div style="font-size: 16px; font-weight: 600; color: #111827;">{{venue}}</div>
                    </td>
                  </tr>
                </table>
              </div>
              
              <!-- CTA -->
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="margin: 24px 0;">
                <tr>
                  <td align="center">
                    <a href="{{rsvp_url}}" style="display: inline-block; padding: 14px 32px; background: #16A34A; color: #FFFFFF; font-size: 16px; font-weight: 600; text-decoration: none; border-radius: 10px; box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3);">Confirm Attendance</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          
          <!-- Footer -->
          <tr>
            <td style="padding: 24px 32px; background: #F9FAFB; border-top: 1px solid #E5E7EB;">
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                <tr>
                  <td style="text-align: center; font-size: 12px; color: #9CA3AF; line-height: 1.6;">
                    MyChama Technologies · Nairobi, Kenya
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
