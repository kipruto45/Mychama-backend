<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{{title}} - MyChama</title>
  
  <!-- Email Design System -->
  <style>
    /* ========================
       EMAIL DESIGN SYSTEM
       MyChama Email Templates
       ======================== */
    
    :root {
      /* Brand Colors */
      --primary: #16A34A;
      --primary-dark: #15803D;
      --primary-light: #22C55E;
      --primary-bg: #F0FDF4;
      
      /* Neutral Colors */
      --black: #0A0A0A;
      --gray-900: #111827;
      --gray-800: #1F2937;
      --gray-700: #374151;
      --gray-600: #4B5563;
      --gray-500: #6B7280;
      --gray-400: #9CA3AF;
      --gray-300: #D1D5DB;
      --gray-200: #E5E7EB;
      --gray-100: #F3F4F6;
      --gray-50: #F9FAFB;
      --white: #FFFFFF;
      
      /* Semantic Colors */
      --success: #16A34A;
      --warning: #F59E0B;
      --error: #DC2626;
      --info: #3B82F6;
      
      /* Layout */
      --max-width: 600px;
      --container-padding: 24px;
      --content-padding: 32px;
      
      /* Typography */
      --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      --font-size-xs: 12px;
      --font-size-sm: 14px;
      --font-size-base: 16px;
      --font-size-lg: 18px;
      --font-size-xl: 20px;
      --font-size-2xl: 24px;
      --font-size-3xl: 28px;
      
      /* Spacing */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      --space-12: 48px;
      
      /* Border Radius */
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --radius-full: 9999px;
    }
    
    /* Reset & Base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: var(--font-family);
      font-size: var(--font-size-base);
      line-height: 1.6;
      color: var(--gray-800);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    /* Email Container */
    .email-container {
      width: 100%;
      max-width: var(--max-width);
      margin: 0 auto;
      background: var(--white);
    }
    
    /* Header */
    .email-header {
      padding: var(--space-6) var(--content-padding);
      text-align: center;
      border-bottom: 1px solid var(--gray-100);
    }
    
    .logo {
      font-size: var(--font-size-xl);
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
      display: inline-block;
    }
    
    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: var(--radius-md);
      color: var(--white);
      font-weight: 700;
      font-size: var(--font-size-lg);
    }
    
    /* Main Content */
    .email-content {
      padding: var(--space-8) var(--content-padding);
    }
    
    /* Typography */
    .heading-1 {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      color: var(--gray-900);
      line-height: 1.3;
      margin-bottom: var(--space-4);
    }
    
    .heading-2 {
      font-size: var(--font-size-xl);
      font-weight: 600;
      color: var(--gray-900);
      line-height: 1.4;
      margin-bottom: var(--space-3);
    }
    
    .heading-3 {
      font-size: var(--font-size-lg);
      font-weight: 600;
      color: var(--gray-800);
      line-height: 1.4;
      margin-bottom: var(--space-2);
    }
    
    .body-text {
      font-size: var(--font-size-base);
      color: var(--gray-700);
      line-height: 1.7;
      margin-bottom: var(--space-4);
    }
    
    .body-text-sm {
      font-size: var(--font-size-sm);
      color: var(--gray-600);
      line-height: 1.6;
    }
    
    .caption {
      font-size: var(--font-size-sm);
      color: var(--gray-500);
      line-height: 1.5;
    }
    
    /* CTA Button */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-3) var(--space-6);
      font-size: var(--font-size-base);
      font-weight: 600;
      text-decoration: none;
      border-radius: var(--radius-md);
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
    }
    
    .btn-primary {
      background: var(--primary);
      color: var(--white);
    }
    
    .btn-primary:hover {
      background: var(--primary-dark);
    }
    
    .btn-secondary {
      background: transparent;
      color: var(--primary);
      border: 2px solid var(--primary);
    }
    
    .btn-secondary:hover {
      background: var(--primary-bg);
    }
    
    .btn-full {
      width: 100%;
    }
    
    .btn-block {
      display: block;
      width: 100%;
    }
    
    /* Cards */
    .card {
      background: var(--gray-50);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      margin: var(--space-4) 0;
    }
    
    .card-border {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      margin: var(--space-4) 0;
    }
    
    .card-highlight {
      background: var(--primary-bg);
      border: 1px solid var(--primary-light);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      margin: var(--space-4) 0;
    }
    
    /* Info Row */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-3) 0;
      border-bottom: 1px solid var(--gray-100);
    }
    
    .info-row:last-child {
      border-bottom: none;
    }
    
    .info-label {
      font-size: var(--font-size-sm);
      color: var(--gray-500);
    }
    
    .info-value {
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: var(--gray-800);
      text-align: right;
    }
    
    /* Alert Boxes */
    .alert {
      padding: var(--space-4);
      border-radius: var(--radius-md);
      margin: var(--space-4) 0;
    }
    
    .alert-success {
      background: #F0FDF4;
      border: 1px solid #BBF7D0;
      color: #166534;
    }
    
    .alert-warning {
      background: #FFFBEB;
      border: 1px solid #FDE68A;
      color: #92400E;
    }
    
    .alert-error {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      color: #991B1B;
    }
    
    .alert-info {
      background: #EFF6FF;
      border: 1px solid #BFDBFE;
      color: #1E40AF;
    }
    
    /* OTP Code */
    .otp-code {
      font-size: var(--font-size-3xl);
      font-weight: 700;
      letter-spacing: 0.3em;
      color: var(--primary);
      text-align: center;
      padding: var(--space-4);
      background: var(--gray-100);
      border-radius: var(--radius-md);
      font-family: monospace;
    }
    
    /* Amount Display */
    .amount-display {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      color: var(--gray-900);
    }
    
    .amount-currency {
      font-size: var(--font-size-base);
      font-weight: 500;
      color: var(--gray-500);
      margin-right: var(--space-1);
    }
    
    /* Status Badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: var(--space-1) var(--space-3);
      font-size: var(--font-size-xs);
      font-weight: 600;
      border-radius: var(--radius-full);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .status-success {
      background: #F0FDF4;
      color: #166534;
    }
    
    .status-warning {
      background: #FFFBEB;
      color: #92400E;
    }
    
    .status-error {
      background: #FEF2F2;
      color: #991B1B;
    }
    
    .status-info {
      background: #EFF6FF;
      color: #1E40AF;
    }
    
    /* Divider */
    .divider {
      height: 1px;
      background: var(--gray-200);
      margin: var(--space-6) 0;
    }
    
    /* Links */
    .link {
      color: var(--primary);
      text-decoration: underline;
    }
    
    .link:hover {
      color: var(--primary-dark);
    }
    
    /* Footer */
    .email-footer {
      padding: var(--space-6) var(--content-padding);
      text-align: center;
      background: var(--gray-50);
    }
    
    .footer-links {
      margin-bottom: var(--space-4);
    }
    
    .footer-links a {
      color: var(--gray-600);
      text-decoration: none;
      font-size: var(--font-size-sm);
      margin: 0 var(--space-3);
    }
    
    .footer-links a:hover {
      color: var(--primary);
    }
    
    .footer-text {
      font-size: var(--font-size-xs);
      color: var(--gray-500);
      line-height: 1.6;
    }
    
    .footer-social {
      margin-top: var(--space-4);
    }
    
    .footer-social a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: var(--gray-200);
      border-radius: var(--radius-full);
      color: var(--gray-600);
      margin: 0 var(--space-2);
      text-decoration: none;
    }
    
    /* Responsive */
    @media only screen and (max-width: 640px) {
      .email-content {
        padding: var(--space-6) var(--space-4);
      }
      
      .email-header {
        padding: var(--space-4);
      }
      
      .email-footer {
        padding: var(--space-4);
      }
      
      .heading-1 {
        font-size: var(--font-size-xl);
      }
      
      .amount-display {
        font-size: var(--font-size-xl);
      }
    }
    
    /* Dark Mode Support */
    @media (prefers-color-scheme: dark) {
      body {
        background: #1F2937;
      }
      
      .email-container {
        background: #111827;
      }
      
      .email-header {
        border-bottom-color: #374151;
      }
      
      .heading-1, .heading-2, .heading-3 {
        color: var(--white);
      }
      
      .body-text {
        color: #D1D5DB;
      }
      
      .card {
        background: #1F2937;
      }
      
      .card-border {
        background: #111827;
        border-color: #374151;
      }
      
      .info-row {
        border-bottom-color: #374151;
      }
      
      .otp-code {
        background: #374151;
      }
      
      .email-footer {
        background: #1F2937;
      }
    }
    
    /* Plain Text Fallback */
    .plain-text-only {
      display: none;
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #F3F4F6;">
  <!-- Preheader (hidden) -->
  <div style="display: none; font-size: 0; color: transparent; mso-hide: all;">
    {{preheader}}
  </div>
  
  <!-- Email Wrapper -->
  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #F3F4F6;">
    <tr>
      <td align="center" style="padding: 20px 0;">
        <!-- Email Container -->
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="max-width: 600px; background-color: #FFFFFF; border-radius: 12px;">
          <!-- Header -->
          <tr>
            <td style="padding: 24px 32px; text-align: center; border-bottom: 1px solid #E5E7EB;">
              &nbsp;
            </td>
          </tr>
          
          <!-- Main Content -->
          <tr>
            <td style="padding: 32px;">
              {{content}}
            </td>
          </tr>
          
          <!-- Footer -->
          <tr>
            <td style="padding: 24px 32px; background: #F9FAFB; border-radius: 0 0 12px 12px;">
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                <tr>
                  <td style="text-align: center; padding-bottom: 16px;">
                    <a href="{{support_url}}" style="color: #6B7280; text-decoration: none; font-size: 14px; margin: 0 12px;">Support</a>
                    <a href="{{privacy_url}}" style="color: #6B7280; text-decoration: none; font-size: 14px; margin: 0 12px;">Privacy</a>
                    <a href="{{terms_url}}" style="color: #6B7280; text-decoration: none; font-size: 14px; margin: 0 12px;">Terms</a>
                  </td>
                </tr>
                <tr>
                  <td style="text-align: center; font-size: 12px; color: #9CA3AF; line-height: 1.6;">
                    {{company_name}}<br>
                    {{company_address}}<br>
                    {{unsubscribe_text}}
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
