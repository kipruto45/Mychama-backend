name: Security

on:
  schedule:
    - cron: "0 3 * * 1"
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  release:
    types: [published]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit bandit

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2

      - name: Dependency vulnerabilities
        run: pip-audit -r requirements.txt

      - name: Bandit static scan
        run: |
          bandit -q -r apps api core config --exclude */migrations/*

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  image-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t mychama-backend:security-scan .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: mychama-backend:security-scan
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  dast-zap:
    if: (github.event_name == 'release' || github.event_name == 'workflow_dispatch') && secrets.STAGING_BASE_URL != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Run ZAP baseline against staging
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ secrets.STAGING_BASE_URL }}
          allow_issue_writing: false
